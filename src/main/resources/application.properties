spring.application.name=sb-ecom

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

project.image=images/

# JWT only this line changed
app.jwt.secret=mySecretKey123912738ujeachdjhbakjojnuihqjsdckjsdchfcgfxjfcghcfgvf
app.jwt.expiration=86400000
spring.ecom.app.jwtCookieName=springBootEcom

# Logging
logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.ecommerce.sb_ecom=DEBUG